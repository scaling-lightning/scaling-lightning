name: Build and push sidecar

on:
    workflow_call:
        inputs:
            image_name:
                description: 'Name for the docker image'
                required: true
                type: string
            dockerfile:
                description: 'Path to the dockerfile'
                required: true
                type: string
            latest:
                description: 'Whether to tag the image as latest'
                required: false
                type: boolean
                default: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v3

      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ inputs.image_name }}
          flavor: |
            latest=${{ inputs.latest && 'true' || 'false' }}
          tags: |
            type=semver,pattern={{version}}

      -
        name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      -
        name: Build and push multi-arch image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      -
        name: Inspect image manifest
        run: |
          docker buildx imagetools inspect ${{ inputs.image_name }}:${{ steps.meta.outputs.version }}