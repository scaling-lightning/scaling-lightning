name: Release charts, docker images and binaries

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
      - "[0-9]+.[0-9]+.[0-9]+*"

jobs:
  test:
    uses: ./.github/workflows/run-all-tests.yml
    secrets: inherit
  get-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: olegtarasov/get-tag@v2.1.4
        name: Get tag
        id: tagName
        with:
          tagRegex: "v?(.+)" # Optional. Returns specified group text as tag name. Full tag string is returned if regex is not defined.
          tagRegexGroup: 1 # Optional. Default is 1.
    outputs:
      tag: ${{ steps.tagName.outputs.tag }}
  bitcoind-sidecar-image:
    needs: [test]
    uses: ./.github/workflows/build-and-push-sidecar.yml
    secrets: inherit
    with:
      image_name: scalingln/bitcoind-client
      dockerfile: ./clients/bitcoind/Dockerfile
  cln-sidecar-image:
    needs: [test]
    uses: ./.github/workflows/build-and-push-sidecar.yml
    secrets: inherit
    with:
      image_name: scalingln/cln-client
      dockerfile: ./clients/cln/Dockerfile
  lnd-sidecar-image:
    needs: [test]
    uses: ./.github/workflows/build-and-push-sidecar.yml
    secrets: inherit
    with:
      image_name: scalingln/lnd-client
      dockerfile: ./clients/lnd/Dockerfile
  helm-charts:
    permissions:
     contents: write
    runs-on: ubuntu-latest
    name: Deploy Helm charts
    needs: [test, get-tag]
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          ref: 'main'
      - name: Package charts
        run: helm package charts/bitcoind charts/cln charts/lnd --version ${{ needs.get-tag.outputs.tag }} --destination pages/static/charts
      - name: Index charts
        run: helm repo index pages/static/charts --url https://scalinglightning.com/charts
      - name: Commit published charts to github pages directory
        uses: EndBug/add-and-commit@v9
  deploy-pages:
    permissions:
      contents: write
    needs: [helm-charts]
    uses: ./.github/workflows/deploy-docs-on-push-to-main.yml
    secrets: inherit

